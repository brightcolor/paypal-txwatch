services:
  app:
    image: ghcr.io/brightcolor/paypal-txwatch:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE:-paypal_txwatch}
      DB_USERNAME: ${DB_USERNAME:-paypal_txwatch}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ./storage:/var/www/html/storage
      - ./docker/data/public:/public-export
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      # Bind to localhost only – the app is reached exclusively via the host's
      # nginx reverse proxy (https://report.hsp-tickets.de). No public port exposure.
      - "127.0.0.1:${APP_PORT:-8090}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/data/public:/var/www/html/public:ro
    depends_on:
      app:
        condition: service_healthy

  queue:
    image: ghcr.io/brightcolor/paypal-txwatch:latest
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=5 --max-time=3600
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_DATABASE: ${DB_DATABASE:-paypal_txwatch}
      DB_USERNAME: ${DB_USERNAME:-paypal_txwatch}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy

  scheduler:
    image: ghcr.io/brightcolor/paypal-txwatch:latest
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_DATABASE: ${DB_DATABASE:-paypal_txwatch}
      DB_USERNAME: ${DB_USERNAME:-paypal_txwatch}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-paypal_txwatch}
      POSTGRES_USER: ${DB_USERNAME:-paypal_txwatch}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ./docker/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-paypal_txwatch}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --dir /data --stop-writes-on-bgsave-error no
    volumes:
      - ./docker/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
