services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    env_file: .env
    depends_on:
      - db
      - redis

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=5", "--max-time=3600"]
    volumes:
      - ./:/var/www/html
    env_file: .env
    depends_on:
      - db
      - redis

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: ["sh", "-c", "while true; do php artisan schedule:run; sleep 60; done"]
    volumes:
      - ./:/var/www/html
    env_file: .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-paypal_txwatch}
      POSTGRES_USER: ${DB_USERNAME:-paypal_txwatch}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ./.docker/pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_FORWARD_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./.docker/redisdata:/data
