; PHP-FPM's default clear_env=yes wipes the container's environment for
; worker processes (unlike `docker compose exec`, which inherits it directly),
; so the Dockerfile's `ENV HOME=/tmp` never reached real web requests. Chromium
; (via Browsershot, for PDF export) needs a writable HOME for its profile/crash
; database dir - without this, it fails with "chrome_crashpad_handler:
; --database is required" only on real HTTP-triggered exports, never on a
; CLI-invoked test of the same code.
[www]
env[HOME] = /tmp
