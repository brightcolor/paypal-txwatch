; Overrides for the stock php:8.3-fpm-bookworm image, which defaults to a
; conservative 128M memory_limit. Filament's admin panel plus PDF/CSV/XLSX
; exports load full Eloquent models (including the JSON-cast raw_payload
; column) for potentially hundreds of transactions at once, which can push
; past 128M as the synced transaction volume grows.
memory_limit = 256M

; --- OPcache tuned for a Filament app in a container ---
; Code only ever changes via a new image (container restart = fresh FPM =
; fresh OPcache), so per-request file stat()s are pure waste. Profiling showed
; ~95% of the transactions page's time in PHP rendering, not SQL.
opcache.validate_timestamps = 0
; Filament + vendor easily exceed the default 10000 files, which makes the
; cache evict and recompile itself continuously.
opcache.max_accelerated_files = 30000
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 32
