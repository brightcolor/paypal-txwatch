server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 20m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Docker's internal resolver - re-resolves "app" hostname after container
        # restarts (Watchtower replaces the container, giving it a new IP; without
        # this nginx keeps the stale IP cached for the lifetime of the worker process)
        resolver 127.0.0.11 valid=10s;
        set $phpfpm "app:9000";
        fastcgi_pass $phpfpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_connect_timeout 5s;
        fastcgi_send_timeout    120s;
        fastcgi_read_timeout    120s;

        # During deploys PHP-FPM is briefly unavailable -> show auto-reload page
        fastcgi_intercept_errors on;
        error_page 502 503 = @deploying;
    }

    location @deploying {
        add_header Retry-After 5 always;
        add_header Content-Type "text/html; charset=utf-8" always;
        return 503 "<!doctype html><html><head><meta charset=utf-8><title>Einen Moment&hellip;</title><meta http-equiv='refresh' content='5'><style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#fafaf9}div{text-align:center;color:#78716c}h1{font-size:1.25rem;font-weight:700;margin:0 0 .5rem}p{font-size:.875rem;margin:0}</style></head><body><div><h1>Wird aktualisiert&hellip;</h1><p>Die Seite l&auml;dt automatisch nach.</p></div></body></html>";
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
